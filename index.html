<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>판다마켓</title>
  </head>

  <body>
    <header>
      <nav class="header-navbar">
        <div id="logo-container">
          <a href="./index.html"
            ><img
              class="logo-image clickable"
              src="./images/logo.png"
              alt="Panda Market logo"
          /></a>
          <p>판다마켓</p>
        </div>

        <ul>
          <li>
            <a href="./view/login.html" class="login-btn clickable">로그인</a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="banner-section">
        <div class="banner-inner">
          <div class="banner-text">
            <p>일상의 모든 물건을<br />거래해 보세요</p>
            <a href="./view/items.html" class="products-btn clickable"
              >구경하러 가기</a
            >
          </div>
          <img
            class="banner-image"
            src="./images/Img_home_top.png"
            alt="Panda Market banner"
          />
        </div>
      </section>

      <div class="home-intro-section">
        <section class="intro-section">
          <section class="hotpage-section">
            <img
              class="hotpage-image"
              src="./images/Img_home_01.jpg"
              alt="인기상품 확인 이미지"
            />
            <div class="hotpage-text">
              <p class="intro-text1">Hot item</p>
              <p class="intro-text2">인기 상품을<br />확인해 보세요</p>
              <p class="intro-text3">
                가장 HOT한 중고거래 물품을 <br />판다 마켓에서 확인해 보세요
              </p>
            </div>
          </section>

          <section class="search-section">
            <div class="search-text">
              <p class="intro-text1">Search</p>
              <p class="intro-text2">구매를 원하는<br />상품을 검색하세요</p>
              <p class="intro-text3">
                구매하고 싶은 물품은 검색해서<br />쉽게 찾아보세요
              </p>
            </div>

            <img
              class="search-image"
              src="./images/Img_home_02.jpg"
              alt="검색하기 이미지"
            />
          </section>

          <section class="sell-section">
            <img
              class="sellPage-image"
              src="./images/Group 33682.jpg"
              alt="판매등록 이미지"
            />

            <div class="sellPage-text">
              <p class="intro-text1">Register</p>
              <p class="intro-text2">판매를 원하는 <br />상품을 등록하세요</p>
              <p class="intro-text3">
                어떤 물건이든 판매하고 싶은 상품을<br />쉽게 등록하세요
              </p>
            </div>
          </section>
        </section>
      </div>
    </main>

    <footer>
      <div class="footer-under-view"></div>
      <section class="footer-banner">
        <div class="banner-inner">
          <div class="banner-text">
            <p>믿을 수 있는<br />판다마켓 중고 거래</p>
          </div>
          <img
            class="banner-image"
            src="./images/Img_home_bottom.png"
            alt="Panda Market banner"
          />
        </div>
      </section>

      <section class="info-footer">
        <nav class="footer-navbar">
          <p class="footer-info-text footer-start-txt">@codeit - 2024</p>

          <ul class="footer-center-txt">
            <li class="footer-info-text footer-privacy-txt">
              <a href="./view/privacy.html">Privacy Policy</a>
            </li>
            <li class="footer-info-text footer-faq-txt">
              <a href="./view/faq.html">FAQ</a>
            </li>
          </ul>

          <ul class="footer-sns-ul">
            <li class="footer-info-text">
              <a
                href="https://www.facebook.com/?locale=ko_KR"
                target="_blank"
                rel="noopener noreferrer"
                ><img src="./images/ic_facebook.png" alt="facebook 이미지"
              /></a>
            </li>
            <li class="footer-info-text">
              <a
                href="https://x.com/?lang=ko"
                target="_blank"
                rel="noopener noreferrer"
                ><img src="./images/ic_twitter.png" alt="twitter 이미지"
              /></a>
            </li>
            <li class="footer-info-text">
              <a
                href="https://www.youtube.com/"
                target="_blank"
                rel="noopener noreferrer"
                ><img src="./images/ic_youtube.png" alt="youtube 이미지" />
              </a>
            </li>
            <li class="footer-info-text">
              <a
                href="https://www.instagram.com/"
                target="_blank"
                rel="noopener noreferrer"
                ><img src="./images/ic_instagram.png" alt="instagram 이미지" />
              </a>
            </li>
          </ul>
        </nav>
      </section>
    </footer>
  </body>
</html>
